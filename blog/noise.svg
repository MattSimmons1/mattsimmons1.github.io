<svg 
  viewBox="0 0 1000 1000"
  xmlns='http://www.w3.org/2000/svg'>

  <filter id='noiseFilter'>
    <feTurbulence 
      type='fractalNoise' 
      baseFrequency='0.75' 
      numOctaves='3' 
      stitchTiles='stitch'>
      <!-- <animate id="noiseAnimate" attributeName="seed" values="1;50;1" from="0" to="100" dur="10s" repeatCount="indefinite"></animate> -->
    </feTurbulence>
  </filter>

  <filter id="grayscale">
    <feColorMatrix type="saturate" values="0"/>
    <feColorMatrix
      type="matrix"
      values="1.4 0 0 0 0
              0 1.4 0 0 0
              0 0 1.4 0 0
              0 0 0 1 0" />
  </filter>

  <rect
    width='100%' 
    height='100%' 
    filter='url(#noiseFilter) url(#grayscale)' />
</svg>