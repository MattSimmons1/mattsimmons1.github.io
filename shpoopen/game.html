    function cleanseGridValue(value, nRows, nColumns) {
      // make sure we always have the same number of lines
      let valueArr = [...value.split("\n"), ...Array(nRows).fill(" ".repeat(nColumns))]
      valueArr = valueArr.slice(0, nRows)

      // make sure each line is exactly the right length. add '·' or remove characters
      valueArr = valueArr.map((d, i) => {
        // TODO: data is lost
        return (d + " ".repeat(nColumns)).slice(0, nColumns)
      })

      return valueArr.join("\n")
    }

    function getInputSelection(el) {
    var start = 0, end = 0, normalizedValue, range,
        textInputRange, len, endRange;

    if (typeof el.selectionStart == "number" && typeof el.selectionEnd == "number") {
        start = el.selectionStart;
        end = el.selectionEnd;
    } else {
        range = document.selection.createRange();

        if (range && range.parentElement() == el) {
            len = el.value.length;
            normalizedValue = el.value.replace(/\r\n/g, "\n");

            // Create a working TextRange that lives only in the input
            textInputRange = el.createTextRange();
            textInputRange.moveToBookmark(range.getBookmark());

            // Check if the start and end of the selection are at the very end
            // of the input, since moveStart/moveEnd doesn't return what we want
            // in those cases
            endRange = el.createTextRange();
            endRange.collapse(false);

            if (textInputRange.compareEndPoints("StartToEnd", endRange) > -1) {
                start = end = len;
            } else {
                start = -textInputRange.moveStart("character", -len);
                start += normalizedValue.slice(0, start).split("\n").length - 1;

                if (textInputRange.compareEndPoints("EndToEnd", endRange) > -1) {
                    end = len;
                } else {
                    end = -textInputRange.moveEnd("character", -len);
                    end += normalizedValue.slice(0, end).split("\n").length - 1;
                }
            }
        }
    }

    return {
        start: start,
        end: end
    };
  }

    function offsetToRangeCharacterMove(el, offset) {
        return offset - (el.value.slice(0, offset).split("\r\n").length - 1);
    }

    function setInputSelection(el, startOffset, endOffset) {
        if (typeof el.selectionStart == "number" && typeof el.selectionEnd == "number") {
            el.selectionStart = startOffset;
            el.selectionEnd = endOffset;
        } else {
            var range = el.createTextRange();
            var startCharMove = offsetToRangeCharacterMove(el, startOffset);
            range.collapse(true);
            if (startOffset == endOffset) {
                range.move("character", startCharMove);
            } else {
                range.moveEnd("character", offsetToRangeCharacterMove(el, endOffset));
                range.moveStart("character", startCharMove);
            }
            range.select();
        }
    }

        ["_", "#999090"],

        ["\\", "#9e959e"],
        ["/", palette.blueGrey, palette.white],// "#9e959e"],

        ["x", palette.white],//"#706664", "#79736a"],
        ["y", "Yellow"],
        ["z", "#bfbfbf"],
        ["H", "#ab8052"],      
      ]

      const allReplacements = characterColours.map(d => d[0])

      // // check each character once to see if it should be replaced
      // value_rows = value.split("\n").map(d => {
      //   return d.split("").map(dd => {
      //     if (dd == " ") {
      //       return "·"
      //     }
      //     else if (allReplacements.includes(dd)) {
      //       const replacement = characterColours.find(ddd => ddd[0] == dd)[1]
      //       return `<span style="color:${replacement};">${dd}</span>`
      //     } else {
      //       return `<span style="color:white;">${dd}</span>`
      //     }
      //   }).join("")
      // })

      const value_rows = value.split("\n")

      const rendered_rows = []
      let lastChar = ""
      for (let i = 0; i < nRows; i++) {
        const row = value_rows[i]
        rendered_row = []
        let pos = 0
        if (!row) continue;
        
        // handle plain text lines
        if (row[0] == ">") {
          rendered_rows.push([`<span style="color:white;">${row}</span>`])
          continue
        }

        while (pos < nColumns) {

          // if (pos == 1) {
            // rendered_row.push(" ")
          // }

          // handle commands
          if (row[pos] == "/") {
            // read ahead for key words          

            let command = "/command"
            if (row.slice(pos).startsWith(command)) {
              // row = row.slice(command.length)
              rendered_row.push("<span style='color:#ffdd99;'>/command</span>")
              pos += command.length
              continue
            } 
            command = "/bed"
            if (row.slice(pos).startsWith(command)) {
              // row = row.slice(command.length)
              rendered_row.push("<span style='color:#ffdd99;'>/bed</span>")
              pos += command.length
              continue
            } 
          }

          // process character as normal
          const dd = row[pos]
          if (!dd) {
            console.log("not dd", dd)
            rendered_row.push("·")

          else if (dd == " ") {
            rendered_row.push("·")
          } else if (allReplacements.includes(dd)) {

            let colour = replacement[1]
            // if (dd == lastChar && replacement.length > 2) {

              rendered_row.push(`<span style="color:${colour};">${replacementChar}</span>`)
            } else {
              rendered_row.push(`<span style="color:${colour};">${dd}</span>`)
            }
          } else {
            rendered_row.push(`<span style="color:white;">${dd}</span>`)
          }
          pos++  
        }
        rendered_rows.push(rendered_row.join(""))
      }

      value = rendered_rows.join("\n")

      // convert pinboard value to overlay HTML
      // value = value.replace(/ /g, '·').replace(/[^·\nf#|]/g, ' ')

        // value = value.replaceAll(characterColours[i][0], `<span style="color: ${characterColours[i][1]};">${characterColours[i][0]}</span>`)
      // }
      

      return value

            game.world.level = {x:1, y:0}
          }
          else {

            // create the level
            level = levels[`${event.x},${event.y}`] = Array(nRows-1).fill(" ".repeat(nColumns)).join("\n") + "\n" + "######  ".repeat(nColumns)
          }
          grid.value = cleanseGridValue(level, nRows, nColumns)
          overlay.innerHTML = parsePinboard(grid.value)
          game.resetWorld(grid.value, grid.offsetHeight, grid.offsetWidth)
        }
          
        const game = new Game(playerElement, grid.value, grid.offsetHeight, grid.offsetWidth, onLevelLoad)
        game.gameLoop()

        // when the text area is selected replace all spaces with '·'
        grid.addEventListener("focus", () => {
          console.log("focus grid")
          // grid.value = grid.value.replace(/ /g, '·')
          // overlay.innerHTML = parsePinboard(grid.value)
        })
        grid.addEventListener("focusout", () => {
          // overlay.innerHTML = parsePinboard(grid.value)
        })

        grid.addEventListener("input", e => {

          // get user's cursor position so we can restore it after the update
          var sel = getInputSelection(grid);
          grid.value = cleanseGridValue(grid.value, nRows, nColumns)
          overlay.innerHTML = parsePinboard(grid.value)
          if (e.data === null && e.inputType === "insertLineBreak") {
            console.log("new line", e, sel)
            sel.start += nColumns
            sel.end += nColumns
          }
          setInputSelection(grid, sel.start, sel.end);

          game.resetWorld(grid.value, grid.offsetHeight, grid.offsetWidth)
        })
      }
    })
